<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Flappymon</title>
  <style>
    :root {
      --bg-1: #fff3d9;
      --bg-2: #ffd9b3;
      --ink: #1f1a17;
      --card: #fff7ea;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 20% 20%, #ffffff99, transparent 40%), linear-gradient(140deg, var(--bg-1), var(--bg-2));
      overflow: hidden;
      padding-top: max(10px, env(safe-area-inset-top));
    }
    .shell {
      width: min(94vw, 520px);
      background: var(--card);
      border: 4px solid var(--ink);
      border-radius: 18px;
      box-shadow: 0 14px 0 #00000020;
      padding: 14px;
    }
    .title {
      margin: 0 0 10px;
      font-size: clamp(1.3rem, 2vw + 1rem, 2rem);
      letter-spacing: 0.5px;
    }
    .hud {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      font-weight: 700;
    }
    canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
      border: 3px solid var(--ink);
      background: linear-gradient(#fff8ec, #ffe8ca 65%, #f9d5a5);
      touch-action: none;
    }
    .tip {
      margin: 10px 0 0;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="shell">
    <h1 class="title">Flappymon</h1>
    <div class="hud">
      <span id="score">Score: 0</span>
      <span id="state">Awake</span>
    </div>
    <canvas id="game" width="480" height="720" aria-label="Flappymon game canvas"></canvas>
    <p class="tip">Tap to Flap, If Mon sleeps tap repeatedly to wake</p>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreNode = document.getElementById("score");
    const stateNode = document.getElementById("state");

    const world = { gravity: 0.34, flap: -7.6, speed: 2.2, speedRampPerSec: 0.045, spawnEvery: 1300 };
    const bird = { x: 120, y: 250, r: 20, vy: 0, asleep: false };

    let obstacles = [];
    let score = 0;
    let lastSpawn = 0;
    let runStartTime = 0;
    let wakeTapsNeeded = 0;
    let wakeTapProgress = 0;
    let sleepSounds = [];

    const obstacleTypes = [
      { icon: "mail" },
      { icon: "alarm" },
      { icon: "bell" },
      { icon: "briefcase" },
      { icon: "calendar" }
    ];

    function svgToImage(svgMarkup) {
      const image = new Image();
      image.src = `data:image/svg+xml;utf8,${encodeURIComponent(svgMarkup)}`;
      return image;
    }

    const obstacleIconMap = {
      mail: svgToImage("<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'><rect x='8' y='18' width='80' height='60' rx='10' fill='#f06595' stroke='#222' stroke-width='4'/><path d='M12 24l36 28 36-28' fill='none' stroke='#222' stroke-width='4'/><path d='M12 70l23-21M84 70L61 49' fill='none' stroke='#222' stroke-width='4'/></svg>"),
      alarm: svgToImage("<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'><circle cx='48' cy='52' r='30' fill='#74c0fc' stroke='#222' stroke-width='4'/><path d='M48 52l0-14M48 52l12 7' stroke='#222' stroke-width='5' stroke-linecap='round'/><rect x='18' y='10' width='18' height='10' rx='4' fill='#4dabf7' stroke='#222' stroke-width='3'/><rect x='60' y='10' width='18' height='10' rx='4' fill='#4dabf7' stroke='#222' stroke-width='3'/></svg>"),
      bell: svgToImage("<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'><path d='M48 17c-12 0-21 10-21 22v14l-9 11v8h60v-8l-9-11V39c0-12-9-22-21-22z' fill='#ffd43b' stroke='#222' stroke-width='4'/><circle cx='48' cy='76' r='7' fill='#fab005' stroke='#222' stroke-width='3'/></svg>"),
      briefcase: svgToImage("<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'><rect x='10' y='28' width='76' height='48' rx='8' fill='#b197fc' stroke='#222' stroke-width='4'/><path d='M36 28v-8a4 4 0 014-4h16a4 4 0 014 4v8' fill='none' stroke='#222' stroke-width='4'/><rect x='42' y='46' width='12' height='8' rx='2' fill='#222'/></svg>"),
      calendar: svgToImage("<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'><rect x='12' y='16' width='72' height='64' rx='8' fill='#69db7c' stroke='#222' stroke-width='4'/><rect x='12' y='16' width='72' height='16' rx='8' fill='#40c057'/><path d='M28 10v14M68 10v14M22 44h10M43 44h10M64 44h10M22 60h10M43 60h10M64 60h10' stroke='#222' stroke-width='4' stroke-linecap='round'/></svg>")
    };
    let audioUnlocked = false;

    async function unlockAudio() {
      if (audioUnlocked) return;
      if (audioCtx.state === "suspended") {
        try {
          await audioCtx.resume();
        } catch {
          return;
        }
      }
      audioUnlocked = audioCtx.state === "running";
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function blip(freq, duration, type, volume) {
      const now = audioCtx.currentTime;
      const oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      oscillator.type = type;
      oscillator.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(volume, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      oscillator.connect(gain);
      gain.connect(audioCtx.destination);
      oscillator.start(now);
      oscillator.stop(now + duration);
    }

    function playFlapSound() {
      blip(640, 0.06, "square", 0.05);
      blip(520, 0.08, "square", 0.04);
    }

    function playHitSound() {
      blip(180, 0.14, "sawtooth", 0.06);
      setTimeout(() => blip(120, 0.14, "sawtooth", 0.05), 45);
    }

    function playWakeTapSound() {
      blip(300 + Math.random() * 140, 0.05, "triangle", 0.045);
    }

    function playWakeUpSound() {
      blip(440, 0.06, "square", 0.05);
      setTimeout(() => blip(660, 0.08, "square", 0.05), 55);
    }

    function reset() {
      bird.y = canvas.height * 0.38;
      bird.vy = 0;
      bird.asleep = false;
      obstacles = [];
      score = 0;
      runStartTime = performance.now();
      lastSpawn = runStartTime;
      wakeTapProgress = 0;
      wakeTapsNeeded = 0;
      sleepSounds = [];
      updateHud();
    }

    function sleepMode() {
      bird.asleep = true;
      bird.vy = 0;
      wakeTapsNeeded = 3 + ((Math.random() * 3) | 0);
      wakeTapProgress = 0;
      sleepSounds = [];
      playHitSound();
      updateHud();
    }

    function wakeUp() {
      if (!bird.asleep) return;
      playWakeUpSound();
      reset();
    }

    function updateHud() {
      scoreNode.textContent = `Score: ${score}`;
      stateNode.textContent = bird.asleep ? "\u{1F634}" : "\u{1F60A}";
      stateNode.style.color = bird.asleep ? "#d6336c" : "#2f9e44";
    }

    function spawnObstacle(now) {
      if (now - lastSpawn < world.spawnEvery) return;
      lastSpawn = now;
      const type = obstacleTypes[(Math.random() * obstacleTypes.length) | 0];
      const w = 98;
      const h = 76;
      const margin = 90;
      const y = margin + Math.random() * (canvas.height - margin * 2 - h);
      obstacles.push({ x: canvas.width + 40, y, w, h, type, passed: false });
    }

    function flap() {
      if (bird.asleep) return;
      playFlapSound();
      bird.vy = world.flap;
    }

    function collideRectCircle(rx, ry, rw, rh, cx, cy, cr) {
      const nearestX = Math.max(rx, Math.min(cx, rx + rw));
      const nearestY = Math.max(ry, Math.min(cy, ry + rh));
      const dx = cx - nearestX;
      const dy = cy - nearestY;
      return (dx * dx + dy * dy) < cr * cr;
    }

    function isPointOnMon(x, y) {
      const dx = x - bird.x;
      const dy = y - bird.y;
      const hitRadius = bird.r + 26;
      return (dx * dx + dy * dy) <= hitRadius * hitRadius;
    }

    function addSleepSound() {
      const sounds = ["zzz", "hmm", "mhm", "nnh", "ugh", "snr"];
      const text = sounds[(Math.random() * sounds.length) | 0];
      sleepSounds.push({ text, x: bird.x - 8 + (Math.random() * 30 - 15), y: bird.y - 20 + (Math.random() * 24 - 12), life: 48 });
    }

    function asleepTap(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const x = ((clientX - rect.left) / rect.width) * canvas.width;
      const y = ((clientY - rect.top) / rect.height) * canvas.height;
      if (!isPointOnMon(x, y)) return false;
      wakeTapProgress += 1;
      addSleepSound();
      playWakeTapSound();
      if (wakeTapProgress >= wakeTapsNeeded) wakeUp();
      return true;
    }

    function getTouchPoint(event) {
      const touch = event.touches[0] || event.changedTouches[0];
      if (!touch) return null;
      return { x: touch.clientX, y: touch.clientY };
    }

    function drawBird() {
      const tilt = Math.max(-0.6, Math.min(1.1, bird.vy / 9));
      ctx.save();
      ctx.translate(bird.x, bird.y);
      ctx.rotate(tilt);
      ctx.fillStyle = "#ffe066";
      ctx.beginPath();
      ctx.arc(0, 0, bird.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#000";
      ctx.beginPath();
      ctx.arc(6, -5, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#ff922b";
      ctx.beginPath();
      ctx.moveTo(18, 2);
      ctx.lineTo(29, 8);
      ctx.lineTo(18, 14);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawObstacle(ob) {
      const icon = obstacleIconMap[ob.type.icon];
      if (!icon || !icon.complete) return;
      ctx.drawImage(icon, ob.x, ob.y, ob.w, ob.h);
    }

    function drawBubble() {
      const bubbleText = "xui thakile hoi";
      ctx.font = "700 22px Trebuchet MS";
      const textWidth = ctx.measureText(bubbleText).width;
      const bw = textWidth + 44;
      const bh = 70;
      const bx = Math.min(canvas.width - bw - 12, bird.x + 12);
      const by = bird.y - 110;
      ctx.fillStyle = "#ffffff";
      ctx.strokeStyle = "#111";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.roundRect(bx, by, bw, bh, 18);
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(bx + 30, by + bh);
      ctx.lineTo(bx + 16, by + bh + 24);
      ctx.lineTo(bx + 56, by + bh);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "#111";
      ctx.textAlign = "left";
      ctx.fillText(bubbleText, bx + 22, by + 44);
    }

    function update(now) {
      const elapsedSec = (now - runStartTime) / 1000;
      const currentSpeed = world.speed + elapsedSec * world.speedRampPerSec;

      if (!bird.asleep) {
        bird.vy += world.gravity;
        bird.y += bird.vy;
        spawnObstacle(now);
      } else {
        bird.vy += world.gravity * 0.28;
        bird.y = Math.min(canvas.height - bird.r, bird.y + bird.vy);
      }

      for (const ob of obstacles) {
        if (!bird.asleep) ob.x -= currentSpeed;
      }

      obstacles = obstacles.filter(ob => ob.x + ob.w > -10);

      if (!bird.asleep) {
        for (const ob of obstacles) {
          const hit = collideRectCircle(ob.x, ob.y, ob.w, ob.h, bird.x, bird.y, bird.r);
          if (hit) {
            sleepMode();
            break;
          }
          if (!ob.passed && ob.x + ob.w < bird.x - bird.r) {
            ob.passed = true;
            score += 1;
            updateHud();
          }
        }
      }

      if (!bird.asleep && (bird.y + bird.r >= canvas.height || bird.y - bird.r <= 0)) {
        sleepMode();
      }
    }

    function drawBackground() {
      ctx.fillStyle = "#f2bf7f";
      ctx.fillRect(0, canvas.height - 80, canvas.width, 80);
      ctx.fillStyle = "#ffecb5";
      for (let i = 0; i < 7; i++) {
        ctx.beginPath();
        ctx.arc(i * 90 + 40, canvas.height - 65, 36, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground();
      for (const ob of obstacles) drawObstacle(ob);
      drawBird();

      for (const sound of sleepSounds) {
        ctx.fillStyle = "#111";
        ctx.font = "700 20px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(sound.text, sound.x, sound.y);
      }

      if (bird.asleep) {
        drawBubble();
        ctx.fillStyle = "#111";
        ctx.font = "bold 22px Trebuchet MS";
        ctx.textAlign = "left";
        ctx.fillText(`Tap Mon to wake: ${wakeTapProgress}/${wakeTapsNeeded}`, 110, 110);
      }
    }

    function loop(now) {
      update(now);
      sleepSounds = sleepSounds.map((sound) => ({ ...sound, y: sound.y - 0.4, life: sound.life - 1 })).filter((sound) => sound.life > 0);
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", (event) => {
      if (event.key !== " " && event.code !== "Space") return;
      event.preventDefault();
      unlockAudio();
      if (bird.asleep) return;
      flap();
    });

    canvas.addEventListener("touchstart", (event) => {
      event.preventDefault();
      unlockAudio();
      if (bird.asleep) {
        const point = getTouchPoint(event);
        if (!point) return;
        asleepTap(point.x, point.y);
        return;
      }
      flap();
    }, { passive: false });

    reset();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
